<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tower Defense</title>
<style>
body {
  text-align: center;
  background: #222;
  color: white;
  font-family: Arial;
}
canvas {
  background: #111;
  border: 2px solid white;
}
</style>
</head>
<body>

<h1>Tower Defense</h1>
<p id="ui"></p>
<p>1: Basic (50) | 2: Strong (100) | 3: Sniper (150) | W: Wall (30)</p>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let enemies = [];
let towers = [];
let bullets = [];
let walls = [];

let health = 100;
let points = 150;

let selected = "basic";

class Enemy {
  constructor() {
    this.x = 0;
    this.y = 200 + Math.random() * 100 - 50;
    this.speed = 1;
    this.hp = 100;
  }

  update() {
    this.x += this.speed;

    // wall collision
    walls.forEach(wall => {
      if (this.x < wall.x + 20 &&
          this.x + 20 > wall.x &&
          this.y < wall.y + 20 &&
          this.y + 20 > wall.y) {

        this.speed = 0;
        wall.hp--;

        if (wall.hp <= 0) {
          walls.splice(walls.indexOf(wall), 1);
          this.speed = 1;
        }
      }
    });

    if (this.x > canvas.width) {
      health -= 10;
      this.dead = true;
    }
  }

  draw() {
    ctx.fillStyle = "red";
    ctx.fillRect(this.x, this.y, 20, 20);
  }
}

class Tower {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type;

    if (type === "basic") {
      this.range = 120;
      this.fireRate = 60;
      this.damage = 25;
      this.color = "blue";
    }
    if (type === "strong") {
      this.range = 140;
      this.fireRate = 80;
      this.damage = 50;
      this.color = "green";
    }
    if (type === "sniper") {
      this.range = 200;
      this.fireRate = 120;
      this.damage = 100;
      this.color = "purple";
    }

    this.cooldown = 0;
    this.angle = 0;
    this.target = null;
  }

  findTarget() {
    let closest = null;
    let closestDist = this.range;

    enemies.forEach(enemy => {
      let dx = enemy.x - this.x;
      let dy = enemy.y - this.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < closestDist) {
        closest = enemy;
        closestDist = dist;
      }
    });

    this.target = closest;
  }

  update() {
    this.findTarget();

    if (this.target) {
      let dx = this.target.x - this.x;
      let dy = this.target.y - this.y;
      this.angle = Math.atan2(dy, dx);

      if (this.cooldown <= 0) {
        bullets.push(new Bullet(this.x, this.y, this.target, this.damage));
        this.cooldown = this.fireRate;
      }
    }

    if (this.cooldown > 0) this.cooldown--;
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle = "white";
    ctx.fillRect(0, -3, 20, 6);
    ctx.restore();
  }
}

class Wall {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.hp = 3;
  }

  draw() {
    ctx.fillStyle = "gray";
    ctx.fillRect(this.x, this.y, 20, 20);

    ctx.fillStyle = "white";
    ctx.fillText(this.hp, this.x + 6, this.y + 14);
  }
}

class Bullet {
  constructor(x, y, target, damage) {
    this.x = x;
    this.y = y;
    this.target = target;
    this.speed = 4;
    this.damage = damage;
    this.hit = false;
  }

  update() {
    if (!this.target) return;

    let dx = this.target.x - this.x;
    let dy = this.target.y - this.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 5) {
      this.target.hp -= this.damage;
      this.hit = true;

      if (this.target.hp <= 0) {
        points += 20;
      }

      return;
    }

    this.x += (dx / dist) * this.speed;
    this.y += (dy / dist) * this.speed;
  }

  draw() {
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// controls
document.addEventListener("keydown", (e) => {
  if (e.key === "1") selected = "basic";
  if (e.key === "2") selected = "strong";
  if (e.key === "3") selected = "sniper";
  if (e.key.toLowerCase() === "w") selected = "wall";
});

// spawn enemies
setInterval(() => {
  enemies.push(new Enemy());
}, 1500);

// place objects
canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let cost = 0;

  if (selected === "basic") cost = 50;
  if (selected === "strong") cost = 100;
  if (selected === "sniper") cost = 150;
  if (selected === "wall") cost = 30;

  if (points < cost) return;

  if (selected === "wall") {
    walls.push(new Wall(x, y));
  } else {
    towers.push(new Tower(x, y, selected));
  }

  points -= cost;
});

function updateUI() {
  document.getElementById("ui").innerText =
    "Health: " + health + " | Points: " + points + " | Selected: " + selected;
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  enemies.forEach((enemy, i) => {
    enemy.update();
    enemy.draw();
    if (enemy.hp <= 0 || enemy.dead) enemies.splice(i, 1);
  });

  towers.forEach(tower => {
    tower.update();
    tower.draw();
  });

  walls.forEach(wall => wall.draw());

  bullets.forEach((bullet, i) => {
    bullet.update();
    bullet.draw();
    if (bullet.hit) bullets.splice(i, 1);
  });

  updateUI();

  if (health <= 0) {
    alert("Game Over!");
    location.reload();
    return;
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
